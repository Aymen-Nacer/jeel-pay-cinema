services:
  db:
    image: mysql:8.0
    container_name: cinema-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cinema
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cinema-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cinema?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: secret
      MOYASAR_PUBLIC_KEY: ${MOYASAR_PUBLIC_KEY}
      MOYASAR_SECRET_KEY: ${MOYASAR_SECRET_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_BASE_URL: http://localhost:8080

volumes:
  mysql-data:
