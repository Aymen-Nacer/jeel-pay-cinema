<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Log in')}"></head>
<body>
<nav th:replace="~{fragments/layout :: authNav('/register', 'Register', 'btn btn-primary')}"></nav>
<main>
    <div class="auth-card-wrapper">
        <div class="card">
            <div class="card-body">
                <h2>Log in</h2>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="username">Email</label>
                        <input id="username" type="email" name="username" placeholder="you@example.com" required/>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" placeholder="Your password" required/>
                    </div>
                    <button type="submit" class="btn-submit btn-full">Log in</button>
                </form>

                <p class="auth-switch">
                    No account? <a href="/register">Register</a>
                </p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
